apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: skynet

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: docker.io/gopal1409/frontend

        ports:
        - containerPort: 80