apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ${REPO_NAME}-${PROJECT_NAME}-${ENV}

spec:
  replicas: 2

  selector:apiVersion: v1
kind: Namespace
metadata:
  name: ${REPO_NAME}-${PROJECT_NAME}-${ENV}
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: docker.io/${DOCKER_USERNAME}/backend:${IMAGE_TAG}

        ports:
        - containerPort: 8080