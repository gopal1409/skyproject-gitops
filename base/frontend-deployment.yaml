apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: docker.io/gopal1409/frontend:8bda5169f329e415071bb577adf6df82938a2c00

        ports:
        - containerPort: 80