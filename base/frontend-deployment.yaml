apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: docker.io/gopal1409/frontend:1fa1e9437b4a869995cd9ad7f3aa783cb4e14112

        ports:
        - containerPort: 80