apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: docker.io/gopal1409/frontend:ba3e2a8bbb2b5e37332665a4cb9095f9f632d58c

        ports:
        - containerPort: 80